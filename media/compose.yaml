# Compose file for the *arr stack. Configuration files are stored in the
# directory you launch the compose file on. Change to bind mounts if needed.
# All containers are ran with user and group ids of the main user and
# group to aviod permissions issues of downloaded files, please refer
# the read me file for more information.

#############################################################################
# NOTICE: We recently switched to using a .env file. PLEASE refer to the docs.
# https://github.com/TechHutTV/homelab/tree/main/media#docker-compose-and-env
#############################################################################

networks:
  servarrnetwork:
    name: servarrnetwork
    ipam:
      config:
        - subnet: 172.39.0.0/24

services:
  # airvpn recommended (referral url: https://airvpn.org/?referred_by=673908)
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun # If running on an LXC see readme for more info.
    networks:
      servarrnetwork:
        ipv4_address: 172.39.0.2
    ports:
      - ${QBITTORRENT_PORT}:8083 # qbittorrent web interface
      - ${QBITTORRENT_TORRENT_PORT}:6881 # qbittorrent torrent port
      - ${NZBGET_PORT}:6789 # nzbget
      - ${PROWLARR_PORT}:9696 # prowlarr
    volumes:
      - /mnt/media/configs/gluetun:/gluetun
    environment:
      - TZ=${TZ}
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      # - SERVER_COUNTRIES=${SERVER_COUNTRIES}
      # - HEALTH_VPN_DURATION_INITIAL=${HEALTH_VPN_DURATION_INITIAL}
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    labels:
      icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/gluetun.png
    x-casaos:
      envs:
        - container: TZ
          description:
            en_us: "Timezone"
        - container: VPN_SERVICE_PROVIDER
          description:
            en_us: "VPN Service Provider"
        - container: VPN_TYPE
          description:
            en_us: "VPN Type (openvpn/wireguard)"
        - container: SERVER_COUNTRIES
          description:
            en_us: "VPN Server Countries"
      ports:
        - container: "8083"
          description:
            en_us: "Gluetun Control Server (qBittorrent WebUI via VPN)"
        - container: "6881"
          description:
            en_us: "qBittorrent torrent port"
        - container: "6789"
          description:
            en_us: "NZBGet WebUI"
        - container: "9696"
          description:
            en_us: "Prowlarr WebUI"
      volumes:
        - container: /gluetun
          description:
            en_us: "Gluetun configuration directory"

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    labels:
      - deunhealth.restart.on.unhealthy=true
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=${QBITTORRENT_PORT} # must match "qbittorrent web interface" port number in gluetun's service above
      # TORRENTING_PORT not set - PureVPN does not support automatic port forwarding like AirVPN
    volumes:
      - /mnt/media/configs/qbittorrent:/config
      - /mnt/media:/mnt/media
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    network_mode: service:gluetun
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 60s
      retries: 3
      start_period: 20s
      timeout: 10s
    x-casaos:
      envs:
        - container: PUID
          description:
            en_us: "User ID"
        - container: PGID
          description:
            en_us: "Group ID"
        - container: TZ
          description:
            en_us: "Timezone"
        - container: WEBUI_PORT
          description:
            en_us: "WebUI Port"
      volumes:
        - container: /config
          description:
            en_us: "qBittorrent configuration directory"
        - container: /mnt/media
          description:
            en_us: "Media storage directory"

  # See the 'qBittorrent Stalls with VPN Timeout' section for more information.
  deunhealth:
    image: qmcgaw/deunhealth
    container_name: deunhealth
    network_mode: "none"
    environment:
      - LOG_LEVEL=info
      - HEALTH_SERVER_ADDRESS=127.0.0.1:9999
      - TZ=${TZ}
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/docker.png
    x-casaos:
      envs:
        - container: LOG_LEVEL
          description:
            en_us: "Log Level"
        - container: TZ
          description:
            en_us: "Timezone"
      volumes:
        - container: /var/run/docker.sock
          description:
            en_us: "Docker socket for container health monitoring"

  nzbget:
    image: lscr.io/linuxserver/nzbget:latest
    container_name: nzbget
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/media/configs/nzbget:/config
      - /mnt/media:/mnt/media
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    network_mode: service:gluetun
    labels:
      icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/nzbget.png
    x-casaos:
      envs:
        - container: PUID
          description:
            en_us: "User ID"
        - container: PGID
          description:
            en_us: "Group ID"
        - container: TZ
          description:
            en_us: "Timezone"
      volumes:
        - container: /config
          description:
            en_us: "NZBGet configuration directory"
        - container: /mnt/media
          description:
            en_us: "Media storage directory"

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/media/configs/prowlarr:/config
    restart: unless-stopped
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    network_mode: service:gluetun
    labels:
      icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/prowlarr.png
    x-casaos:
      envs:
        - container: PUID
          description:
            en_us: "User ID"
        - container: PGID
          description:
            en_us: "Group ID"
        - container: TZ
          description:
            en_us: "Timezone"
      volumes:
        - container: /config
          description:
            en_us: "Prowlarr configuration directory"

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/media/configs/sonarr:/config
      - /mnt/media:/mnt/media
    ports:
      - ${SONARR_PORT}:8989
    networks:
      servarrnetwork:
        ipv4_address: 172.39.0.3
    labels:
      icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/sonarr.png
    x-casaos:
      envs:
        - container: PUID
          description:
            en_us: "User ID"
        - container: PGID
          description:
            en_us: "Group ID"
        - container: TZ
          description:
            en_us: "Timezone"
      ports:
        - container: "8989"
          description:
            en_us: "Sonarr WebUI"
      volumes:
        - container: /config
          description:
            en_us: "Sonarr configuration directory"
        - container: /mnt/media
          description:
            en_us: "Media storage directory"

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/media/configs/radarr:/config
      - /mnt/media:/mnt/media
    ports:
      - ${RADARR_PORT}:7878
    networks:
      servarrnetwork:
        ipv4_address: 172.39.0.4
    labels:
      icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/radarr.png
    x-casaos:
      envs:
        - container: PUID
          description:
            en_us: "User ID"
        - container: PGID
          description:
            en_us: "Group ID"
        - container: TZ
          description:
            en_us: "Timezone"
      ports:
        - container: "7878"
          description:
            en_us: "Radarr WebUI"
      volumes:
        - container: /config
          description:
            en_us: "Radarr configuration directory"
        - container: /mnt/media
          description:
            en_us: "Media storage directory"

  lidarr:
    container_name: lidarr
    image: lscr.io/linuxserver/lidarr:latest
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/media/configs/lidarr:/config
      - /mnt/media:/mnt/media
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - ${LIDARR_PORT}:8686
    networks:
      servarrnetwork:
        ipv4_address: 172.39.0.5
    labels:
      icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/lidarr.png
    x-casaos:
      envs:
        - container: PUID
          description:
            en_us: "User ID"
        - container: PGID
          description:
            en_us: "Group ID"
        - container: TZ
          description:
            en_us: "Timezone"
      ports:
        - container: "8686"
          description:
            en_us: "Lidarr WebUI"
      volumes:
        - container: /config
          description:
            en_us: "Lidarr configuration directory"
        - container: /mnt/media
          description:
            en_us: "Media storage directory"

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/media/configs/bazarr:/config
      - /mnt/media:/mnt/media
    ports:
      - ${BAZARR_PORT}:6767
    networks:
      servarrnetwork:
        ipv4_address: 172.39.0.6
    labels:
      icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/bazarr.png
    x-casaos:
      envs:
        - container: PUID
          description:
            en_us: "User ID"
        - container: PGID
          description:
            en_us: "Group ID"
        - container: TZ
          description:
            en_us: "Timezone"
      ports:
        - container: "6767"
          description:
            en_us: "Bazarr WebUI"
      volumes:
        - container: /config
          description:
            en_us: "Bazarr configuration directory"
        - container: /mnt/media
          description:
            en_us: "Media storage directory"

