# Nginx Proxy Manager — HTTPS reverse proxy for all homelab services
#
# LAN HTTPS setup (*.lan or your LAN_TLD — must match Pi-hole domain name):
#   1. Set LAN_TLD in .env (copy from .env.example).
#   2. In your router or Pi-hole, add a wildcard DNS A record:
#        *.${LAN_TLD}  →  ${HOST_IP}
#   3. In NPM (http://${HOST_IP}:${NPM_ADMIN_PORT:-8181}), create proxy hosts:
#
#   --- media/compose.yaml ---
#   qbittorrent.${LAN_TLD}  → http://${HOST_IP}:${QBITTORRENT_PORT}   (8083)
#   nzbget.${LAN_TLD}       → http://${HOST_IP}:${NZBGET_PORT}         (6789)
#   prowlarr.${LAN_TLD}     → http://${HOST_IP}:${PROWLARR_PORT}       (9696)
#   sonarr.${LAN_TLD}       → http://${HOST_IP}:${SONARR_PORT}         (8989)
#   radarr.${LAN_TLD}       → http://${HOST_IP}:${RADARR_PORT}         (7878)
#   lidarr.${LAN_TLD}       → http://${HOST_IP}:${LIDARR_PORT}         (8686)
#   bazarr.${LAN_TLD}       → http://${HOST_IP}:${BAZARR_PORT}         (6767)
#
#   --- media/jellyfin/compose.yaml ---
#   jellyfin.${LAN_TLD}     → http://${HOST_IP}:${JELLYFIN_PORT}       (8096)
#   jellyseerr.${LAN_TLD}   → http://${HOST_IP}:${JELLYSEERR_PORT}     (5055)
#   jellystat.${LAN_TLD}    → http://${HOST_IP}:${JELLYSTAT_PORT}      (3000)
#
#   4. For SSL: use NPM's built-in Let's Encrypt (public domain) or generate a
#      local self-signed / custom CA cert for your LAN_TLD wildcard.
#      A local CA is recommended for purely internal *.home.arpa domains.

services:
  proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - ${HOST_IP}:${NPM_HTTP_PORT:-80}:80
      - ${HOST_IP}:${NPM_HTTPS_PORT:-443}:443
      - ${HOST_IP}:${NPM_ADMIN_PORT:-8181}:81
    volumes:
      - ${CONFIG_DIR}/nginx-proxy-manager/data:/data
      - ${CONFIG_DIR}/nginx-proxy-manager/letsencrypt:/etc/letsencrypt
    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      interval: 10s
      timeout: 3s

  # [OPTIONAL] Automatically creates all proxy hosts in NPM via its API on first run.
  # Runs once and exits — safe to re-run (skips hosts that already exist).
  # Requires NPM_ADMIN_EMAIL / NPM_ADMIN_PASSWORD in .env.
  # Remove the '#' from each line below to enable.
  npm-init:
    image: curlimages/curl:latest
    container_name: npm-init
    restart: "no"
    depends_on:
      proxy:
        condition: service_healthy
    environment:
      - NPM_URL=http://proxy:81
      - NPM_EMAIL=${NPM_ADMIN_EMAIL}
      - NPM_PASSWORD=${NPM_ADMIN_PASSWORD}
      - HOST_IP=${HOST_IP}
      - LAN_TLD=${LAN_TLD}
      - SONARR_PORT=${SONARR_PORT:-8989}
      - RADARR_PORT=${RADARR_PORT:-7878}
      - LIDARR_PORT=${LIDARR_PORT:-8686}
      - BAZARR_PORT=${BAZARR_PORT:-6767}
      - PROWLARR_PORT=${PROWLARR_PORT:-9696}
      - QBITTORRENT_PORT=${QBITTORRENT_PORT:-8083}
      - NZBGET_PORT=${NZBGET_PORT:-6789}
      - JELLYFIN_PORT=${JELLYFIN_PORT:-8096}
      - JELLYSEERR_PORT=${JELLYSEERR_PORT:-5055}
      - JELLYSTAT_PORT=${JELLYSTAT_PORT:-3000}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        # Authenticate and get token
        TOKEN=$(curl -sf -X POST "$NPM_URL/api/tokens" \
          -H "Content-Type: application/json" \
          -d "{\"identity\":\"$NPM_EMAIL\",\"secret\":\"$NPM_PASSWORD\"}" \
          | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
        [ -z "$TOKEN" ] && echo "NPM auth failed" && exit 1
  
        # Helper: create a proxy host if the domain doesn't already exist
        create_host() {
          DOMAIN=$1 PORT=$2
          EXISTS=$(curl -sf "$NPM_URL/api/nginx/proxy-hosts" \
            -H "Authorization: Bearer $TOKEN" \
            | grep -c "\"$DOMAIN\"" || true)
          [ "$EXISTS" -gt 0 ] && echo "skip $DOMAIN" && return
          curl -sf -X POST "$NPM_URL/api/nginx/proxy-hosts" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"domain_names\":[\"$DOMAIN\"],\"forward_scheme\":\"http\",
                 \"forward_host\":\"$HOST_IP\",\"forward_port\":$PORT,
                 \"block_exploits\":true,\"allow_websocket_upgrade\":true}" \
            && echo "created $DOMAIN"
        }
  
        create_host "sonarr.$LAN_TLD"      $SONARR_PORT
        create_host "radarr.$LAN_TLD"      $RADARR_PORT
        create_host "lidarr.$LAN_TLD"      $LIDARR_PORT
        create_host "bazarr.$LAN_TLD"      $BAZARR_PORT
        create_host "prowlarr.$LAN_TLD"    $PROWLARR_PORT
        create_host "qbittorrent.$LAN_TLD" $QBITTORRENT_PORT
        create_host "nzbget.$LAN_TLD"      $NZBGET_PORT
        create_host "jellyfin.$LAN_TLD"    $JELLYFIN_PORT
        create_host "jellyseerr.$LAN_TLD"  $JELLYSEERR_PORT
        create_host "jellystat.$LAN_TLD"   $JELLYSTAT_PORT
        echo "npm-init done"

